<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face2Face — Peer-to-peer Video Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            400: '#38bdf8',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/css/home.css">
</head>

<body class="min-h-screen bg-slate-950 text-slate-100 antialiased overflow-x-hidden">
    <!-- loading overlay (toggled by home.js) -->
    <div class="loading">
        <div class="spinner"></div>
    </div>

    <!-- decorative background glow -->
    <div class="pointer-events-none fixed inset-0 bg-glow"></div>

    <main class="relative min-h-screen flex flex-col items-center justify-center px-4 py-10">

        <!-- logo + title -->
        <div class="flex items-center gap-3 mb-3">
            <span class="flex h-12 w-12 items-center justify-center rounded-2xl bg-brand-500/15 ring-1 ring-brand-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-400" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m22 8-6 4 6 4V8Z" />
                    <rect width="14" height="12" x="2" y="6" rx="2" ry="2" />
                </svg>
            </span>
            <h1 class="text-4xl font-bold tracking-tight">Face<span class="text-brand-400">2</span>Face</h1>
        </div>
        <p class="text-slate-400 text-center max-w-md mb-10">
            Peer-to-peer video calls, chat and file sharing — right in your browser. No account needed.
        </p>

        <!-- action card -->
        <div class="w-full max-w-md rounded-2xl bg-slate-900/80 backdrop-blur ring-1 ring-white/10 shadow-2xl shadow-black/50 p-6 sm:p-8">

            <label for="roomID" class="block text-sm font-medium text-slate-300 mb-2">Join with a room code</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <input id="roomID" type="text" pattern="[a-z]{3}-[a-z]{3}-[a-z]{3}" placeholder="abc-def-ghi"
                    autocomplete="off" spellcheck="false"
                    class="flex-1 min-w-0 rounded-xl bg-slate-800/80 px-4 py-3 font-mono tracking-widest text-slate-100 placeholder-slate-500 ring-1 ring-white/10 outline-none transition focus:ring-2 focus:ring-brand-500">
                <button id="joinRoom"
                    class="rounded-xl bg-brand-600 px-6 py-3 font-semibold text-white transition hover:bg-brand-500 active:scale-[.98] disabled:opacity-50 disabled:cursor-not-allowed">
                    Join
                </button>
            </div>

            <div class="flex items-center gap-4 my-6">
                <span class="h-px flex-1 bg-white/10"></span>
                <span class="text-xs uppercase tracking-wider text-slate-500">or</span>
                <span class="h-px flex-1 bg-white/10"></span>
            </div>

            <button id="createRoom"
                class="w-full rounded-xl bg-slate-100 px-6 py-3 font-semibold text-slate-900 transition hover:bg-white active:scale-[.98] disabled:opacity-50 disabled:cursor-not-allowed">
                Create a new room
            </button>

            <div class="error mt-4 min-h-[1.25rem] text-center text-sm text-rose-400"></div>
        </div>

        <footer class="mt-10 text-xs text-slate-600">
            Built with WebRTC · 1-on-1 rooms
        </footer>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/js/home.js"></script>
</body>

</html>
